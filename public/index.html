<!DOCTYPE html>
<html>
<head>
  <title>ZennqBot Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    /* STYLE ASLI KAMU */
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
    html{scroll-behavior:smooth;}
    html,body{width:100%;min-height:100%;overflow-x:hidden;}
    body{background:url('background.jpg') no-repeat center center/cover;color:white;}
    body::before{
      content:"";position:fixed;inset:0;width:200%;height:200%;
      background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02), transparent 40px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02), transparent 40px);
      animation:move 20s linear infinite;
    }
    @keyframes move{from{transform:translate(0,0);}to{transform:translate(-200px,-200px);}}

    .overlay{
      position:relative;width:100%;min-height:100vh;background:rgba(0,0,0,0.5);
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      padding-top:50px;z-index:1;
    }

    /* SIDEBAR NEON STYLE */
    .menu-btn {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      padding: 12px; border-radius: 10px; border: 2px solid cyan;
      background: rgba(0,0,0,0.6); color: cyan; cursor: pointer;
      backdrop-filter: blur(10px); font-weight: bold; transition: 0.3s;
    }
    .menu-btn:hover { box-shadow: 0 0 15px cyan; transform: scale(1.05); }

    .sidebar {
      position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
      transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; padding-top: 80px;
      border-right: 3px solid cyan; box-shadow: 10px 0 30px rgba(0,255,255,0.2);
    }
    .sidebar.active { left: 0; }
    .sidebar-item {
      padding: 20px 30px; font-size: 18px; color: white; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
    }
    .sidebar-item:hover { background: rgba(0,255,255,0.2); text-shadow: 0 0 10px cyan; padding-left: 40px; }

    /* PANEL & ANIMASI GLOW */
    .panel {
      width:90%; max-width:900px; padding:40px; border-radius:20px;
      text-align:center; backdrop-filter:blur(10px); animation:glow 6s infinite alternate;
      display: none; /* Sembunyi secara default */
    }
    .panel.active { display: block; }

    @keyframes glow{
      0%{box-shadow:0 0 20px red;} 25%{box-shadow:0 0 20px blue;}
      50%{box-shadow:0 0 20px purple;} 75%{box-shadow:0 0 20px cyan;}
      100%{box-shadow:0 0 20px lime;}
    }

    .title{font-size:42px; margin-bottom:20px; animation:textGlow 5s infinite alternate;}
    @keyframes textGlow{
      0%{text-shadow:0 0 10px red;} 25%{text-shadow:0 0 10px blue;}
      50%{text-shadow:0 0 10px purple;} 75%{text-shadow:0 0 10px cyan;}
      100%{text-shadow:0 0 10px lime;}
    }

    .field{font-size:20px;margin:10px 0;}
    input{margin-top:15px; padding:12px; width:85%; border-radius:10px; border:none; text-align:center; background: rgba(255,255,255,0.9);}
    .buttons{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
    .btn{
      padding:12px 20px; border-radius:10px; border:none; cursor:pointer;
      background:rgba(255,255,255,0.1); color:white; transition:0.3s; font-weight: bold;
    }
    .btn:hover{transform:scale(1.1); box-shadow:0 0 20px white; background: rgba(255,255,255,0.2);}

    /* LOADER */
    .loader{margin: 20px auto; width:100px; height:100px; position:relative; display:none;}
    .ring{
      position:absolute; width:100%; height:100%; border-radius:50%;
      border:4px solid transparent; border-top:4px solid red;
      animation:spin 1s linear infinite, rgb 3s infinite alternate;
    }
    .ring2{width:80%; height:80%; top:10%; left:10%; animation-duration:0.8s;}
    .ring3{width:60%; height:60%; top:20%; left:20%; animation-duration:0.6s;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes rgb{
      0%{border-top-color:red;box-shadow:0 0 20px red;}
      100%{border-top-color:lime;box-shadow:0 0 20px lime;}
    }

    .preview{margin-top:20px; width:100%; display:none; text-align:center;}
    video{width:100%; border-radius:15px; border: 2px solid rgba(255,255,255,0.2);}

    /* LIST STYLE */
    .list-container { text-align: left; max-width: 500px; margin: 20px auto; }
    .list-box { 
      background: rgba(255,255,255,0.05); padding: 15px; 
      border-left: 4px solid cyan; border-radius: 5px; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<button class="menu-btn" onclick="toggleSidebar()">☰ MENU</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-item" onclick="changePage('dashboard')">🏠 Dashboard</div>
  <div class="sidebar-item" onclick="changePage('listlink')">🔗 List Link</div>
  <div class="sidebar-item" onclick="changePage('platform')">📱 Platform</div>
</div>

<div class="overlay">

  <div id="dashboard" class="panel active">
    <div class="title">𝕯𝖆𝖘𝖍𝖇𝖔𝖆𝖗𝖉 𝓩𝖊𝖓𝖓</div>
    <div class="field">Status: <span id="status" style="color: lime;">Loading...</span></div>
    <div class="field">Uptime: <span id="uptime">0</span>s</div>
    <div class="field">Owner: 𝓩𝖊𝖓𝖓</div>

    <input id="ttlink" placeholder="Paste link TikTok disini">
    <div class="buttons">
      <button class="btn" onclick="downloadTT()">Download TikTok</button>
    </div>

    <div id="loader" class="loader">
      <div class="ring"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
    </div>

    <div class="buttons">
      <a id="downloadBtn" class="btn" style="background: rgba(0,255,255,0.2);" target="_blank">Download Video</a>
    </div>

    <div class="buttons">
      <a class="btn" href="https://discord.com/users/1259852674757824584" target="_blank">Owner</a>
      <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1469601350441635852" target="_blank">Invite</a>
      <button class="btn" onclick="playAudio()">Play</button>
      <button class="btn" onclick="stopAudio()">Stop</button>
    </div>

    <div class="preview" id="previewBox">
      <h2 style="margin: 10px 0;">Preview Video</h2>
      <video id="videoPreview" controls></video>
    </div>
  </div>

  <div id="listlink" class="panel">
    <div class="title">𝕷𝖎𝖓𝖐 𝕷𝖎𝖘𝖙</div>
    <div class="list-container">
      <div class="list-box"><b>TikTok API:</b> tikwm.com</div>
      <div class="list-box"><b>Storage:</b> catbox.moe / top4top</div>
      <div class="list-box"><b>Bot Dev:</b> discord.js / python</div>
      <div class="list-box"><b>Hosting:</b> Vercel / Pterodactyl</div>
    </div>
    <button class="btn" onclick="changePage('dashboard')">Back to Home</button>
  </div>

  <div id="platform" class="panel">
    <div class="title">𝕻𝖑𝖆𝖙𝖋𝖔𝖗𝖒</div>
    <div class="buttons" style="flex-direction: column; align-items: center;">
      <button class="btn" style="width: 200px; margin: 5px;" onclick="alert('Platform Selected: Android')">Android</button>
      <button class="btn" style="width: 200px; margin: 5px;" onclick="alert('Platform Selected: PC')">PC</button>
      <button class="btn" style="width: 200px; margin: 5px;" onclick="alert('Platform Selected: PC / Android')">PC / Android</button>
    </div>
    <button class="btn" style="margin-top: 30px;" onclick="changePage('dashboard')">Back to Home</button>
  </div>

</div>

<audio id="audio"><source src="audio.mp3" type="audio/mpeg"></audio>
<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Zennq System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

    body{
      background:url('background.jpg') no-repeat center center/cover;
      color:white; overflow-x:hidden; min-height: 100vh;
    }

    /* GRID ANIMATION */
    body::before{
      content:"";position:fixed;inset:0;width:200%;height:200%;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02), transparent 40px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02), transparent 40px);
      animation:gridMove 20s linear infinite;
    }
    @keyframes gridMove{from{transform:translate(0,0);}to{transform:translate(-200px,-200px);}}

    .overlay{
      position:relative;width:100%;min-height:100vh;background:rgba(0,0,0,0.6);
      display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;
    }

    .menu-trigger {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer;
      backdrop-filter: blur(5px); transition: 0.3s; font-size: 11px;
    }

    .panel {
      width:90%; max-width:440px; padding:35px 20px; border-radius:30px;
      text-align:center; backdrop-filter:blur(25px);
      background: rgba(255,255,255,0.03);
      border: 2px solid transparent;
      animation: rgbGlow 8s linear infinite;
    }

    @keyframes rgbGlow {
      0% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
      33% { border-color: #00ff00; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
      66% { border-color: #0000ff; box-shadow: 0 0 20px rgba(0,0,255,0.4); }
      100% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
    }

    /* SEMUA JUDUL RGB */
    .title {
      font-size:32px; margin-bottom:20px; letter-spacing:2px;
      font-weight: bold; animation: textRgb 5s linear infinite;
    }
    @keyframes textRgb {
      0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
      33% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
      66% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
      100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    }

    .field{font-size:18px; margin:8px 0; color: rgba(255,255,255,0.9);}

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);} }

    .menu-list { display: flex; flex-direction: column; gap: 30px; margin-top: 20px; }
    .opt-text {
      font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.3s;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
    }
    .opt-text:hover { color: white; text-shadow: 0 0 15px white; transform: scale(1.1); }

    input, textarea {
      width: 90%; padding: 12px; margin-top: 15px; border-radius: 12px;
      border: none; background: rgba(255,255,255,0.95);
      color: black; text-align: center; outline: none;
    }

    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }

    .btn {
      padding: 12px 20px; border-radius: 15px; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
      transition: 0.3s; font-size: 14px; min-width: 105px;
    }
    .btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }

    /* STYLE ARCHIVE CARD DENGAN TOMBOL HAPUS */
    .archive-card {
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;
      margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: left;
      position: relative;
    }
    .archive-card img { width: 100%; border-radius: 12px; margin-bottom: 10px; }
    .archive-card h3 { color: cyan; margin-bottom: 5px; }

    .btn-del {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,0,0,0.5); border: none; color: white;
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      font-weight: bold; font-size: 12px;
    }

    video { width: 100%; border-radius: 15px; margin-top: 15px; }
    
    .file-box {
      margin-top: 15px; border: 1px dashed rgba(255,255,255,0.3);
      padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05);
      width: 90%; margin-left: auto; margin-right: auto;
    }
  </style>
</head>
<body>

<button class="menu-trigger" onclick="changePage('nav')">MENU</button>

<div class="overlay">
  <div class="panel">

    <div id="nav" class="section">
      <div class="title">𝖅𝕰𝕹𝕹𝕼 𝕾𝖄𝕾𝕿𝕰𝕸</div>
      <div class="menu-list">
        <div class="opt-text" onclick="changePage('dash')">. Dashboard</div>
        <div class="opt-text" onclick="changePage('upload')">. Upload Link</div>
        <div class="opt-text" onclick="changePage('list')">. List Link</div>
      </div>
    </div>

    <div id="dash" class="section active">
  <div class="title">𝕯𝖆𝖘𝖍𝖇𝖔𝖆𝖗𝖉 𝓩𝖊𝖓𝖓</div>
  <div class="field">Status: <span id="status">ONLINE</span></div>
  <div class="field">Runtime: <span id="uptime">0</span></div> 
  <div class="field">Owner: 𝓩𝖊𝖓𝖓</div>

  <input id="ttlink" placeholder="Paste TikTok link here">


      <div class="btn-group">
        <button class="btn" style="width: 80%;" onclick="downloadTT()">TikTok Download</button>
      </div>

      <div class="btn-group">
        <a class="btn" href="https://discord.com/users/1259852674757824584" target="_blank">Owner</a>
        <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1469601350441635852&permissions=8&scope=bot+applications.commands">Invite</a>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="playAudio()">Play Music</button>
        <button class="btn" onclick="stopAudio()">Stop</button>
      </div>

      <div id="previewBox" style="display:none;">
        <video id="videoPreview" controls></video>
        <a id="downloadBtn" class="btn" style="display:block; margin-top:10px; background:white; color:black;" target="_blank">Simpan Video</a>
      </div>
    </div>

    <div id="upload" class="section">
      <div class="title">𝖀𝕻𝕷𝕺𝕬𝕯 𝕯𝕬𝕿𝕬</div>
      <input id="up-url" placeholder="Masukkan Link Tujuan">
      
      <div class="file-box">
        <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">Pilih Gambar dari Galeri:</label>
        <input type="file" id="up-file" accept="image/*" style="background: transparent; color: white; border: none; font-size: 12px; width: 100%;">
      </div>

      <input id="up-title" placeholder="Masukkan Judul">
      <textarea id="up-desc" placeholder="Masukkan Deskripsi" rows="3" style="width:90%; border-radius:12px; margin-top:15px; padding:10px; border:none;"></textarea>
      
      <button class="btn" style="width: 90%; margin-top: 20px; background: rgba(255,255,255,0.2);" onclick="saveLink()">COMMIT</button>
    </div>

    <div id="list" class="section">
      <div class="title">𝕬𝕽𝕮𝕳𝕴𝖁𝕰 𝕷𝕴𝕾𝕿</div>
      <div id="archive-container" style="max-height: 400px; overflow-y: auto; padding: 10px;"></div>
      <button class="btn" style="margin-top: 20px;" onclick="changePage('dash')">BACK</button>
    </div>

  </div>
</div>

<audio id="audio"><source src="audio.mp3" type="audio/mpeg"></audio>
<script src="script.js"></script>
</body>
</html>
